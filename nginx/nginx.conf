server {
    listen 80;
    server_name _;

    client_max_body_size 500M;   # set to at least your largest model size

    location / {
        proxy_pass http://mlflow:5000;
        proxy_read_timeout 300s;    # also increase timeout for large uploads
        proxy_send_timeout 300s;
        proxy_set_header Host localhost:5000;
        proxy_set_header Origin http://localhost:5000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

